name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Ne pas redéployer quand le SEUL fichier modifié est le curseur Telegram.
    # last_update_id.txt s'incrémente à chaque run du cron même sans nouveau
    # message (rappel ignoré, message déjà connu…). GitHub saute le workflow
    # lorsque tous les fichiers du push matchent paths-ignore, donc un commit
    # qui touche aussi messages.json ou une image déclenche bien le deploy. (#36)
    paths-ignore:
      - 'public/Assets/last_update_id.txt'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - uses: actions/deploy-pages@v4
        id: deployment
