name: Fetch Telegram Updates

# Exécution schedulée deux fois par jour (06h et 18h UTC).
# Justification cadence : la Bot API Telegram (getUpdates) drop les updates
# non récupérés après 24h. Avec un cron Mon/Thu, le gap pouvait atteindre
# 96h et perdait silencieusement les messages postés en milieu de cycle.
# Deux runs/jour → gap max ~12h, marge confortable même avec le jitter
# des schedules GitHub Actions (souvent retardés de 1-3h en charge).
# Justification slot : 06h UTC = 08h CEST (été) / 07h CET (hiver) pour
# avoir un run "tôt le matin" en heure suisse, et 18h UTC pour la symétrie.
on:
  schedule:
    - cron: '0 6,18 * * *'
  
  # Permet aussi de déclencher manuellement depuis GitHub
  workflow_dispatch:
  

permissions:
  contents: write
  actions: write # nécessaire pour déclencher deploy.yml via workflow_dispatch

jobs:
  fetch-messages:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le repo
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # 3. Installer les dépendances npm
      - name: Install dependencies
        run: npm install
      
      # 4. Lancer le script de récupération
      - name: Fetch new Telegram messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/fetch_telegram_updates.js
      
      # 5. Distinguer DEUX notions de changement :
      #    - changed         : n'importe quoi a bougé dans public/Assets/
      #                        → on commit (pour persister le curseur Telegram).
      #    - content_changed : un fichier AUTRE que last_update_id.txt a bougé
      #                        (messages.json, une image…) → on déploie.
      #    last_update_id.txt s'incrémente à chaque run même sans nouveau message
      #    (rappel ignoré, message déjà connu) : il ne doit PAS déclencher un build.
      - name: Check for real changes
        id: verify_changed_files
        run: |
          git add public/Assets/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          CONTENT=$(git diff --cached --name-only -- public/Assets/ ':(exclude)public/Assets/last_update_id.txt')
          if [ -n "$CONTENT" ]; then
            echo "content_changed=true" >> $GITHUB_OUTPUT
            echo "🆕 Contenu modifié :"; echo "$CONTENT"
          else
            echo "content_changed=false" >> $GITHUB_OUTPUT
          fi

      # 6. Configurer Git
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      # 7. Commit et push (curseur inclus, pour persister l'offset Telegram)
      - name: Commit and push changes
        if: steps.verify_changed_files.outputs.changed == 'true'
        run: |
          git commit -m "🤖 Mise à jour automatique des messages Telegram - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ Changements poussés avec succès"

      # 8. Message d'information si pas de changements
      - name: No changes found
        if: steps.verify_changed_files.outputs.changed == 'false'
        run: echo "✅ Aucun nouveau message trouvé"

      # 9. Déclencher le déploiement SEULEMENT si le contenu visible a changé.
      #
      # Indispensable : le push ci-dessus utilise le GITHUB_TOKEN par défaut, et
      # GitHub n'autorise PAS un tel push à déclencher d'autres workflows (règle
      # anti-récursion). Seul workflow_dispatch/repository_dispatch fait exception.
      # On déclenche donc deploy.yml explicitement, mais uniquement quand
      # content_changed=true → pas de build inutile sur un simple incrément de
      # curseur (cf. #36).
      - name: Trigger deployment
        if: steps.verify_changed_files.outputs.content_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
